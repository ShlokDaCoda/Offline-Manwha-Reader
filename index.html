<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Manhwa Reader V5.5</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#111;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  font-size:20px;
  font-weight:600;
  background:#181818;
}

button{
  padding:8px 14px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

#uploadBtn{
  background:#4caf50;
  color:white;
}

#library{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e1e1e;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card p{
  padding:10px;
  text-align:center;
  font-size:14px;
}

.loadingBarContainer{
  height:6px;
  background:#333;
  width:100%;
}

.loadingBar{
  height:100%;
  background:#4caf50;
  width:0%;
  transition:width 0.3s;
}

#reader{
  display:none;
  padding:10px;
}

.page{
  width:100%;
  margin-bottom:12px;
}

.controls{
  position:fixed;
  bottom:15px;
  left:0;
  right:0;
  display:none;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header>
  <div>📚 My Library V5.5</div>
  <button id="uploadBtn" onclick="document.getElementById('fileUpload').click()">Upload</button>
</header>

<input type="file" id="fileUpload" webkitdirectory directory multiple hidden>

<div id="library"></div>

<div id="reader"></div>

<div class="controls" id="controls">
  <button onclick="prevChapter()">← Prev</button>
  <button onclick="nextChapter()">Next →</button>
  <button onclick="goLibrary()">Library</button>
</div>

<script>

let library = {};
let currentManhwa = null;
let currentChapter = 0;

function renderLibrary(){
  const lib = document.getElementById("library");
  lib.innerHTML = "";

  for(let name in library){
    const card = document.createElement("div");
    card.className = "card";

    let loadingHTML = "";
    if(library[name].loading){
      loadingHTML = `
        <div class="loadingBarContainer">
          <div class="loadingBar" style="width:${library[name].progress}%"></div>
        </div>
      `;
    }

    card.innerHTML = `
      <img src="${library[name].cover || ''}">
      <p>${name}</p>
      ${loadingHTML}
    `;

    card.onclick = () => openManhwa(name);
    lib.appendChild(card);
  }
}

function openManhwa(name){
  if(library[name].chapters.length === 0){
    alert("Still processing first chapter...");
    return;
  }

  currentManhwa = name;
  currentChapter = 0;

  document.getElementById("library").style.display="none";
  document.getElementById("reader").style.display="block";
  document.getElementById("controls").style.display="flex";

  loadChapter();
}

function loadChapter(){
  const reader = document.getElementById("reader");
  reader.innerHTML = "";

  const pages = library[currentManhwa].chapters[currentChapter];

  for(const src of pages){
    const img = document.createElement("img");
    img.src = src;
    img.className="page";
    reader.appendChild(img);
  }

  window.scrollTo(0,0);
}

function nextChapter(){
  if(currentChapter < library[currentManhwa].chapters.length - 1){
    currentChapter++;
    loadChapter();
  } else {
    alert("Next chapter still loading...");
  }
}

function prevChapter(){
  if(currentChapter > 0){
    currentChapter--;
    loadChapter();
  }
}

function goLibrary(){
  document.getElementById("reader").style.display="none";
  document.getElementById("controls").style.display="none";
  document.getElementById("library").style.display="grid";
}

document.getElementById("fileUpload").addEventListener("change", async function(e){

  const files = Array.from(e.target.files);
  const manhwaName = prompt("Manhwa name?") || "Unnamed";

  library[manhwaName] = {
    chapters: [],
    cover: null,
    loading: true,
    progress: 0
  };

  renderLibrary();

  const grouped = {};

  for(const file of files){
    const path = file.webkitRelativePath.split("/");
    if(path.length < 2) continue;

    const folder = path[0];

    if(!grouped[folder]) grouped[folder] = [];
    grouped[folder].push(file);
  }

  // TRUE numeric sort (ch0, ch1, ch2 properly)
  const sortedChapters = Object.keys(grouped).sort((a,b)=>{
    const numA = parseInt(a.match(/\d+/));
    const numB = parseInt(b.match(/\d+/));
    return numA - numB;
  });

  let completed = 0;

  for(const chapter of sortedChapters){

    const pages = [];

    for(const file of grouped[chapter]){
      pages.push(URL.createObjectURL(file));
      await new Promise(r=>setTimeout(r,0));
    }

    library[manhwaName].chapters.push(pages);

    if(!library[manhwaName].cover)
      library[manhwaName].cover = pages[0];

    completed++;
    library[manhwaName].progress = Math.floor((completed / sortedChapters.length) * 100);

    renderLibrary();
  }

  library[manhwaName].loading = false;
  renderLibrary();
});

renderLibrary();

</script>
</body>
</html>
