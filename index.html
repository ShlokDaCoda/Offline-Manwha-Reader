<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 My Library V5.4</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0e0e0e;
  color:white;
  transition:0.3s;
  overflow-x:hidden;
}

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:600;
}

#library{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:15px;
  padding:15px;
  box-sizing:border-box;
}

.card{
  background:#1a1a1a;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:0.2s;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.card p{
  padding:10px;
  font-size:14px;
  text-align:center;
}

.card button{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  border:none;
  color:white;
  border-radius:50%;
  width:26px;
  height:26px;
}

.loadingBarContainer{
  width:100%;
  height:6px;
  background:#333;
}

.loadingBar{
  height:100%;
  background:#4caf50;
  transition:width 0.3s;
}

#reader{
  display:none;
  padding:10px;
}

.page{
  width:100%;
  margin-bottom:12px;
}

.controls{
  position:fixed;
  bottom:15px;
  left:0;
  right:0;
  display:none;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

.controls button, .controls select{
  padding:8px 12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

.controls button{
  background:white;
  color:black;
}

.light{
  background:white;
  color:black;
}
</style>
</head>
<body>

<header>📚 My Library <span>V5.4</span></header>

<div id="library"></div>
<div id="reader"></div>

<div class="controls" id="controls">
  <select id="chapterSelect" onchange="jumpChapter()"></select>
  <button onclick="prevChapter()">← Prev</button>
  <button onclick="nextChapter()">Next →</button>
  <button onclick="toggleTheme()">🌓 Theme</button>
  <button onclick="goLibrary()">📚 Library</button>
</div>

<input type="file" id="fileUpload" webkitdirectory directory multiple
style="position:fixed;bottom:20px;left:20px;">

<script>
let library = JSON.parse(localStorage.getItem("library_v54")) || {};
let currentManhwa=null;
let currentChapter=0;

function save(){
  localStorage.setItem("library_v54",JSON.stringify(library));
}

function renderLibrary(){
  const lib=document.getElementById("library");
  lib.innerHTML="";

  for(let name in library){
    let card=document.createElement("div");
    card.className="card";

    let loading="";
    if(library[name].loading){
      loading=`
        <div class="loadingBarContainer">
          <div class="loadingBar"
          style="width:${library[name].progress||0}%"></div>
        </div>`;
    }

    card.innerHTML=`
      <img src="${library[name].cover||''}">
      <p>${name}</p>
      ${loading}
      <button onclick="deleteManhwa(event,'${name}')">×</button>
    `;

    card.onclick=()=>openManhwa(name);
    lib.appendChild(card);
  }
}

function deleteManhwa(e,name){
  e.stopPropagation();
  if(confirm("Delete "+name+"?")){
    delete library[name];
    save();
    renderLibrary();
  }
}

function openManhwa(name){
  if(library[name].chapters.length===0){
    alert("Still loading first chapter...");
    return;
  }

  currentManhwa=name;
  currentChapter=0;

  document.getElementById("library").style.display="none";
  document.getElementById("reader").style.display="block";
  document.getElementById("controls").style.display="flex";

  populateChapterMenu();
  loadChapter();
}

function populateChapterMenu(){
  const select=document.getElementById("chapterSelect");
  select.innerHTML="";

  library[currentManhwa].chapterNames.forEach((name,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=name;
    select.appendChild(opt);
  });

  select.value=currentChapter;
}

function loadChapter(){
  const reader=document.getElementById("reader");
  reader.innerHTML="";

  const pages=library[currentManhwa].chapters[currentChapter];

  for(let src of pages){
    let img=document.createElement("img");
    img.src=src;
    img.className="page";
    reader.appendChild(img);
  }

  window.scrollTo(0,0);
}

function nextChapter(){
  if(currentChapter<
     library[currentManhwa].chapters.length-1){
    currentChapter++;
    populateChapterMenu();
    loadChapter();
  }else{
    alert("Next chapter still loading...");
  }
}

function prevChapter(){
  if(currentChapter>0){
    currentChapter--;
    populateChapterMenu();
    loadChapter();
  }
}

function jumpChapter(){
  currentChapter=
  parseInt(document.getElementById("chapterSelect").value);
  loadChapter();
}

function goLibrary(){
  document.getElementById("reader").style.display="none";
  document.getElementById("controls").style.display="none";
  document.getElementById("library").style.display="grid";
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme_v54",
  document.body.classList.contains("light"));
}

if(localStorage.getItem("theme_v54")==="true")
  document.body.classList.add("light");

document.getElementById("fileUpload")
.addEventListener("change",async function(e){

  const files=Array.from(e.target.files);
  const manhwaName=
  prompt("Enter Manhwa Name")||"Unnamed";

  library[manhwaName]={
    chapters:[],
    chapterNames:[],
    cover:null,
    loading:true,
    progress:0
  };

  save();
  renderLibrary();

  const grouped={};

  for(const file of files){
    const path=file.webkitRelativePath.split("/");
    if(path.length<2)continue;

    const folder=path[0];
    if(!grouped[folder])grouped[folder]=[];
    grouped[folder].push(file);
  }

  const sorted=Object.keys(grouped)
  .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

  let done=0;

  for(const chap of sorted){

    const pages=[];

    for(const file of grouped[chap]){
      pages.push(URL.createObjectURL(file));
      await new Promise(r=>setTimeout(r,0));
    }

    library[manhwaName].chapters.push(pages);
    library[manhwaName].chapterNames.push(chap);

    if(!library[manhwaName].cover)
      library[manhwaName].cover=pages[0];

    done++;
    library[manhwaName].progress=
    Math.floor((done/sorted.length)*100);

    save();
    renderLibrary();
  }

  library[manhwaName].loading=false;
  save();
  renderLibrary();
});

renderLibrary();
</script>
</body>
</html>
