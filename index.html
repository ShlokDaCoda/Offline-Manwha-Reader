<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Manhwa Reader V6</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#111;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#1a1a1a;
  font-size:20px;
  font-weight:600;
}

button, select{
  padding:8px 12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

#uploadBtn{
  background:#4caf50;
  color:white;
}

#library{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1e1e1e;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card p{
  padding:10px;
  text-align:center;
  font-size:14px;
}

#reader{
  display:none;
  padding:10px;
}

.page{
  width:100%;
  margin-bottom:12px;
}

.controls{
  position:fixed;
  bottom:15px;
  left:0;
  right:0;
  display:none;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header>
  <div>📚 My Library V6</div>
  <button id="uploadBtn" onclick="document.getElementById('fileUpload').click()">Upload</button>
</header>

<input type="file" id="fileUpload" webkitdirectory directory multiple hidden>

<div id="library"></div>
<div id="reader"></div>

<div class="controls" id="controls">
  <select id="chapterSelect" onchange="jumpChapter()"></select>
  <button onclick="prevChapter()">← Prev</button>
  <button onclick="nextChapter()">Next →</button>
  <button onclick="goLibrary()">Library</button>
</div>

<script>

let library = {};
let currentManhwa = null;
let currentChapter = 0;

function renderLibrary(){
  const lib = document.getElementById("library");
  lib.innerHTML = "";

  for(let name in library){
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <img src="${library[name].cover}">
      <p>${name}</p>
    `;
    card.onclick = ()=>openManhwa(name);
    lib.appendChild(card);
  }
}

function openManhwa(name){
  currentManhwa = name;
  currentChapter = 0;

  document.getElementById("library").style.display="none";
  document.getElementById("reader").style.display="block";
  document.getElementById("controls").style.display="flex";

  populateChapterSelect();
  loadChapter();
}

function populateChapterSelect(){
  const select = document.getElementById("chapterSelect");
  select.innerHTML="";

  library[currentManhwa].chapterNames.forEach((chap,i)=>{
    const opt = document.createElement("option");
    opt.value=i;
    opt.text=chap;
    select.appendChild(opt);
  });

  select.value=currentChapter;
}

function loadChapter(){
  const reader = document.getElementById("reader");
  reader.innerHTML="";

  const pages = library[currentManhwa].chapters[currentChapter];

  for(const src of pages){
    const img=document.createElement("img");
    img.src=src;
    img.className="page";
    reader.appendChild(img);
  }

  window.scrollTo(0,0);
}

function jumpChapter(){
  currentChapter=parseInt(document.getElementById("chapterSelect").value);
  loadChapter();
}

function nextChapter(){
  if(currentChapter < library[currentManhwa].chapters.length-1){
    currentChapter++;
    document.getElementById("chapterSelect").value=currentChapter;
    loadChapter();
  }
}

function prevChapter(){
  if(currentChapter>0){
    currentChapter--;
    document.getElementById("chapterSelect").value=currentChapter;
    loadChapter();
  }
}

function goLibrary(){
  document.getElementById("reader").style.display="none";
  document.getElementById("controls").style.display="none";
  document.getElementById("library").style.display="grid";
}

document.getElementById("fileUpload").addEventListener("change", function(e){

  const files = Array.from(e.target.files);
  const manhwaName = prompt("Manhwa name?") || "Unnamed";

  const grouped = {};

  for(const file of files){
    const path = file.webkitRelativePath.split("/");
    if(path.length < 2) continue;

    const folder = path[0];

    if(!grouped[folder]) grouped[folder] = [];
    grouped[folder].push(file);
  }

  // 🔥 SORT CHAPTERS PROPERLY (reads numbers)
  const sortedChapters = Object.keys(grouped).sort((a,b)=>{
    const numA = parseInt(a.match(/\d+/)) || 0;
    const numB = parseInt(b.match(/\d+/)) || 0;
    return numA - numB;
  });

  const finalChapters = [];
  const chapterNames = [];

  for(const chap of sortedChapters){

    // 🔥 SORT PAGES INSIDE CHAPTER
    grouped[chap].sort((a,b)=>{
      const numA = parseInt(a.name.match(/\d+/)) || 0;
      const numB = parseInt(b.name.match(/\d+/)) || 0;
      return numA - numB;
    });

    const pages = grouped[chap].map(file => URL.createObjectURL(file));

    finalChapters.push(pages);
    chapterNames.push(chap);
  }

  library[manhwaName] = {
    chapters: finalChapters,
    chapterNames: chapterNames,
    cover: finalChapters[0][0]
  };

  renderLibrary();
});

renderLibrary();

</script>
</body>
</html>
