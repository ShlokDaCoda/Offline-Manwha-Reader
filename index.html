<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>📖 Manwha Flow · Offline Reader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0b0b0b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* scan‑style header */
    .app-header {
      background: #141414;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(20,20,20,0.96);
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo span {
      background: #d13b3b;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 30px;
      font-weight: 600;
      color: white;
      margin-left: 8px;
    }

    .upload-btn {
      background: #2e7d32;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(46,125,50,0.3);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #3e9f44;
    }

    .upload-btn:active { opacity: 0.8; transform: scale(0.97); }

    /* loading bar overlay (centered modal) */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.2s;
    }

    .loading-card {
      background: #1f1f1f;
      width: 280px;
      padding: 28px 24px;
      border-radius: 36px;
      text-align: center;
      border: 1px solid #3a3a3a;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .loading-card p {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .bar-bg {
      height: 10px;
      background: #2c2c2c;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0 8px;
    }

    .bar-fill {
      height: 10px;
      background: #d13b3b;
      width: 0%;
      border-radius: 20px;
      transition: width 0.2s ease;
    }

    .version-badge {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 12px;
      border-top: 1px dashed #333;
      padding-top: 12px;
    }

    /* library grid — clean scan layout */
    #library {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 18px;
      padding: 20px 16px;
      padding-bottom: 30px;
    }

    .series-card {
      background: #171717;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: transform 0.1s;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0,0,0,0.5);
    }

    .series-card:active { transform: scale(0.98); }

    .card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: #2b2b2b;
      border-bottom: 2px solid #2e7d32;
    }

    .card-title {
      padding: 14px 10px;
      font-weight: 500;
      font-size: 0.95rem;
      text-align: center;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* reader area (chapter pages) */
    #reader {
      display: none;
      padding: 6px 0 80px;
      background: #0a0a0a;
    }

    .page-img {
      width: 100%;
      display: block;
      margin: 0 auto 6px;
      background: #1e1e1e;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* bottom navigation — scan style */
    .chapter-bar {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(28, 28, 30, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 44px;
      padding: 10px 18px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #3c3c3c;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      z-index: 20;
    }

    .chapter-selector {
      background: #262626;
      border: 1px solid #4a4a4a;
      color: white;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      cursor: pointer;
      outline: none;
    }

    .nav-btn {
      background: #2e2e2e;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #4a4a4a;
      box-shadow: 0 2px 6px black;
      cursor: pointer;
      white-space: nowrap;
    }

    .nav-btn:active { background: #3e3e3e; }

    .library-btn {
      background: #2e7d32;
      border: 1px solid #4caf50;
    }

    /* hidden folder input */
    #folderPicker { display: none; }

    /* empty state */
    .empty-library {
      text-align: center;
      margin-top: 60px;
      color: #777;
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="logo">
    📚 MANWHA·FLOW 
    <span id="versionTag">v6</span>
  </div>
  <button class="upload-btn" id="uploadBtn">
    ⬆️ ADD
  </button>
</div>

<!-- hidden folder input (webkitdirectory) -->
<input type="file" id="folderPicker" webkitdirectory directory multiple hidden>

<!-- loading overlay (hidden by default) -->
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="loading-card">
    <p id="loadingStatus">📦 organising episodes…</p>
    <div class="bar-bg"><div id="loadingFill" class="bar-fill" style="width:0%"></div></div>
    <div id="versionMessage" class="version-badge"></div>
  </div>
</div>

<!-- library grid -->
<div id="library"></div>

<!-- reader panel (pages) -->
<div id="reader"></div>

<!-- bottom navigation (chapter bar) -->
<div class="chapter-bar" id="chapterBar">
  <select id="chapterSelect" class="chapter-selector"></select>
  <button class="nav-btn" id="prevBtn">←</button>
  <button class="nav-btn" id="nextBtn">→</button>
  <button class="nav-btn library-btn" id="libraryBtn">🏠</button>
</div>

<script>
  (function() {
    // ---- state ----
    let library = {};                // { manhwaName: { chapters: [urls], chapterNames: [string], cover: url, version: string } }
    let currentManhwa = null;
    let currentChapter = 0;
    let versionCounter = 6;           // start at v6, will increment on each upload

    // ---- DOM elements ----
    const libraryEl = document.getElementById('library');
    const readerEl = document.getElementById('reader');
    const chapterBar = document.getElementById('chapterBar');
    const chapterSelect = document.getElementById('chapterSelect');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const libraryBtn = document.getElementById('libraryBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const folderPicker = document.getElementById('folderPicker');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingFill = document.getElementById('loadingFill');
    const loadingStatus = document.getElementById('loadingStatus');
    const versionMessage = document.getElementById('versionMessage');
    const versionTag = document.getElementById('versionTag');

    // ---- helper: natural sort (extract numbers) ----
    function naturalSort(a, b) {
      const getNum = (str) => {
        const match = str.match(/\d+/);
        return match ? parseInt(match[0], 10) : 0;
      };
      return getNum(a) - getNum(b);
    }

    // ---- render library grid (scan style) ----
    function renderLibrary() {
      libraryEl.innerHTML = '';
      const entries = Object.keys(library);
      if (entries.length === 0) {
        libraryEl.innerHTML = '<div class="empty-library">➕ add a folder to start reading</div>';
        return;
      }

      entries.forEach(name => {
        const series = library[name];
        const card = document.createElement('div');
        card.className = 'series-card';
        card.setAttribute('data-series', name);
        card.innerHTML = `
          <img class="card-img" src="${series.cover || ''}" alt="cover" loading="lazy">
          <div class="card-title">${name}</div>
        `;
        card.addEventListener('click', () => openManhwa(name));
        libraryEl.appendChild(card);
      });
    }

    // ---- open series ----
    function openManhwa(name) {
      currentManhwa = name;
      currentChapter = 0;
      libraryEl.style.display = 'none';
      readerEl.style.display = 'block';
      chapterBar.style.display = 'flex';

      populateChapterDropdown();
      loadChapter();
    }

    function populateChapterDropdown() {
      if (!currentManhwa || !library[currentManhwa]) return;
      const chapters = library[currentManhwa].chapterNames || [];
      chapterSelect.innerHTML = '';
      chapters.forEach((chap, idx) => {
        const option = document.createElement('option');
        option.value = idx;
        option.textContent = chap;
        chapterSelect.appendChild(option);
      });
      chapterSelect.value = currentChapter;
    }

    function loadChapter() {
      if (!currentManhwa) return;
      const series = library[currentManhwa];
      if (!series || !series.chapters || !series.chapters[currentChapter]) return;

      readerEl.innerHTML = ''; 
      const pages = series.chapters[currentChapter];
      for (let src of pages) {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'page-img';
        img.alt = 'page';
        img.loading = 'eager'; // load fast
        readerEl.appendChild(img);
      }
      window.scrollTo(0, 0);
      // update dropdown if needed
      if (chapterSelect.value != currentChapter) {
        chapterSelect.value = currentChapter;
      }
    }

    // ---- chapter navigation ----
    function goToChapter(index) {
      if (!currentManhwa) return;
      const maxIndex = library[currentManhwa].chapters.length - 1;
      if (index < 0 || index > maxIndex) return;
      currentChapter = index;
      chapterSelect.value = currentChapter;
      loadChapter();
    }

    // ---- event listeners for bottom bar ----
    chapterSelect.addEventListener('change', (e) => {
      const val = parseInt(e.target.value, 10);
      if (!isNaN(val)) goToChapter(val);
    });

    prevBtn.addEventListener('click', () => {
      if (currentManhwa) goToChapter(currentChapter - 1);
    });

    nextBtn.addEventListener('click', () => {
      if (currentManhwa) goToChapter(currentChapter + 1);
    });

    libraryBtn.addEventListener('click', () => {
      readerEl.style.display = 'none';
      chapterBar.style.display = 'none';
      libraryEl.style.display = 'grid';
      currentManhwa = null;
    });

    // ---- trigger folder upload ----
    uploadBtn.addEventListener('click', () => {
      folderPicker.click();
    });

    // ---- MAIN PROCESSING: read folder, show loading bar, order everything ----
    folderPicker.addEventListener('change', async function(e) {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;

      // Ask manhwa name (simple prompt)
      let seriesName = prompt('Enter series name:', '');
      if (!seriesName) seriesName = 'Unnamed';

      // Increment version (new upload = new version)
      versionCounter++;
      const newVersion = `v${versionCounter}`;
      versionTag.textContent = newVersion;

      // Show loading overlay, reset bar
      loadingOverlay.style.display = 'flex';
      loadingFill.style.width = '0%';
      loadingStatus.innerText = `📦 loading ${seriesName} …`;
      versionMessage.innerText = `version: ${newVersion} · parsing chapters`;

      // Build chapter map from folder structure (first level folder = chapter)
      const chapterMap = new Map(); // key: chapter folder name, value: array of File objects

      for (const file of files) {
        // webkitRelativePath: "SeriesName/Chapter1/page001.jpg"
        const parts = file.webkitRelativePath.split('/');
        if (parts.length < 2) continue;
        const chapterFolder = parts[1]; // immediate subfolder (or root if flat)
        // If files are directly inside the selected folder (no subfolders), treat entire upload as one chapter
        // but we want chapters: so we group by the folder name.
        if (!chapterMap.has(chapterFolder)) {
          chapterMap.set(chapterFolder, []);
        }
        chapterMap.get(chapterFolder).push(file);
      }

      // If there is only one "folder" that is actually the series name? we need robust grouping.
      // sometimes users select a folder that contains chapter subfolders. we already did.
      // Edge case: no subfolders (all files flat). Then group them as single chapter named "Chapter 1"
      let entries = Array.from(chapterMap.entries());
      if (entries.length === 0) {
        // fallback: treat all files as one chapter
        chapterMap.set('Chapter 1', files);
        entries = [['Chapter 1', files]];
      }

      // Sort chapter folders naturally (Chapter 1, Chapter 2, etc)
      entries.sort((a, b) => naturalSort(a[0], b[0]));

      const chapterNames = [];
      const chapterPages = []; // array of image url arrays
      let totalImages = 0;
      for (let [chapName, fileList] of entries) {
        totalImages += fileList.length;
      }

      let processedImages = 0;
      const coverImagePromise = null; // will set later

      // Process each chapter: sort pages naturally inside
      for (let [chapName, fileList] of entries) {
        // sort files by name (natural numeric order)
        fileList.sort((a, b) => naturalSort(a.name, b.name));

        const pageUrls = [];
        for (const file of fileList) {
          // increment progress
          processedImages++;
          const percent = (processedImages / totalImages) * 100;
          loadingFill.style.width = percent + '%';
          loadingStatus.innerText = `📖 ${chapName} · ${Math.round(percent)}%`;

          // create blob url
          const blob = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(new Blob([reader.result]));
            reader.onerror = () => resolve(null);
            reader.readAsArrayBuffer(file);
          });
          if (blob) {
            const url = URL.createObjectURL(blob);
            pageUrls.push(url);
          } else {
            // fallback: maybe use file directly (but blob is better)
            const url = URL.createObjectURL(file);
            pageUrls.push(url);
          }
        }

        if (pageUrls.length > 0) {
          chapterPages.push(pageUrls);
          chapterNames.push(chapName);
        }
      }

      // after all processed
      if (chapterPages.length === 0) {
        alert('no valid images found');
        loadingOverlay.style.display = 'none';
        folderPicker.value = ''; // clear
        return;
      }

      // set cover as first page of first chapter
      const cover = chapterPages[0][0] || '';

      // store in library
      library[seriesName] = {
        chapters: chapterPages,
        chapterNames: chapterNames,
        cover: cover,
        version: newVersion,
      };

      // re-render library
      renderLibrary();

      // hide overlay
      loadingOverlay.style.display = 'none';

      // clear folderPicker so same folder can be uploaded again
      folderPicker.value = '';

      // if user wants to open after upload (optional)
      // but we stay in library.
    });

    // ---- load sample if empty? not needed, but we prefill some placeholder (optional) ----
    // We'll just show empty library message

    // ---- initial render ----
    renderLibrary();

    // ---- Expose for debugging (optional) ----
    window.debugLib = library;
  })();
</script>
</body>
</html>
