<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhwa Reader V5.2</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0e0e0e;
  color:white;
  transition:0.3s;
  overflow-x:hidden;
}
header{
  padding:15px;
  font-size:22px;
  font-weight:600;
  text-align:center;
}
#versionTag{
  font-size:14px;
  margin-left:10px;
  color:#ccc;
}
#library{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:20px;
  padding:15px;
}
.card{
  background:#1a1a1a;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.card p{
  padding:10px;
  font-size:15px;
  text-align:center;
}
.card button{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  font-size:16px;
}
#reader{
  display:none;
  opacity:0;
  transition:0.3s;
  padding-bottom:80px;
}
img.page{
  width:100%;
  display:block;
  margin-bottom:10px;
}
#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:6px;
  background:#4caf50;
  width:0%;
  z-index:999;
  border-radius:3px;
}
#controls{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  background:rgba(30,30,30,0.9);
  padding:10px 15px;
  border-radius:15px;
  display:flex;
  gap:12px;
  align-items:center;
  z-index:998;
}
#controls button{
  padding:12px 18px;
  font-size:16px;
  border-radius:12px;
  background:#fff;
  color:#000;
  flex-shrink:0;
}
#chapterSelect{
  padding:10px;
  font-size:16px;
  border-radius:12px;
  border:none;
  background:#222;
  color:white;
}
#folderUpload{
  position:fixed;
  bottom:15px;
  left:15px;
}
.light{
  background:white;
  color:black;
}
/* Loading bar */
#loadingBar{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  height:50px;
  background:#333;
  border-radius:20px;
  display:none;
  z-index:9999;
  text-align:center;
  color:white;
  line-height:50px;
  font-weight:bold;
  overflow:hidden;
}
#loadingFill{
  height:100%;
  background:#4caf50;
  width:0%;
  position:absolute;
  top:0;
  left:0;
  border-radius:20px;
  z-index:-1;
}
</style>
</head>
<body>

<div id="progressBar"></div>
<div id="loadingBar"><div id="loadingFill"></div><span id="loadingText"></span></div>

<header>📚 My Library <span id="versionTag">V5.2</span></header>

<div id="library"></div>
<div id="reader"></div>

<div id="controls">
<select id="chapterSelect" onchange="jumpChapter()"></select>
<button onclick="prevChapter()">← Prev</button>
<button onclick="nextChapter()">Next →</button>
<button onclick="toggleTheme()">🌓 Theme</button>
<button onclick="goLibrary()">📚 Library</button>
</div>

<input type="file" id="folderUpload" webkitdirectory directory multiple>

<script>
let library = JSON.parse(localStorage.getItem("library_v5"))||{};
let currentManhwa = null;
let currentChapter = 0;

function save(){localStorage.setItem("library_v5",JSON.stringify(library));}
function renderLibrary(){
  const lib=document.getElementById("library");
  lib.innerHTML="";
  for(let name in library){
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${library[name].cover||''}">
      <p>${name}</p>
      <button onclick="deleteManhwa(event,'${name}')">×</button>
    `;
    card.onclick=()=>openManhwa(name);
    lib.appendChild(card);
  }
}

function deleteManhwa(e,name){
  e.stopPropagation();
  if(confirm("Delete "+name+"?")){
    delete library[name];
    save();
    renderLibrary();
  }
}

function renameManhwa(name){
  let newName=prompt("Rename:",name);
  if(newName){
    library[newName]=library[name];
    delete library[name];
    save();
    renderLibrary();
  }
}

function openManhwa(name){
  currentManhwa=name;
  currentChapter=library[name].bookmark?.chapter||0;
  document.getElementById("library").style.display="none";
  document.getElementById("reader").style.display="block";
  document.getElementById("controls").style.display="flex";
  loadChapter();
  populateChapterMenu();
  setTimeout(()=>{
    document.getElementById("reader").style.opacity=1;
    window.scrollTo(0,library[name].bookmark?.scroll||0);
  },50);
}

function loadChapter(){
  const reader=document.getElementById("reader");
  reader.innerHTML="";
  const pages=library[currentManhwa].chapters[currentChapter];
  pages.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="page";
    reader.appendChild(img);
  });
  window.scrollTo(0,0);
}

function populateChapterMenu(){
  const select=document.getElementById("chapterSelect");
  select.innerHTML="";
  library[currentManhwa].chapters.forEach((c,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.text="Chapter "+(i+1);
    select.appendChild(opt);
  });
  select.value=currentChapter;
}

function jumpChapter(){
  currentChapter=parseInt(document.getElementById("chapterSelect").value);
  loadChapter();
}

function nextChapter(){
  if(currentChapter<library[currentManhwa].chapters.length-1){
    currentChapter++;
    loadChapter();
    populateChapterMenu();
  }
}

function prevChapter(){
  if(currentChapter>0){
    currentChapter--;
    loadChapter();
    populateChapterMenu();
  }
}

function goLibrary(){
  saveBookmark();
  document.getElementById("reader").style.opacity=0;
  setTimeout(()=>{
    document.getElementById("reader").style.display="none";
    document.getElementById("controls").style.display="none";
    document.getElementById("library").style.display="grid";
  },200);
}

function saveBookmark(){
  library[currentManhwa].bookmark={
    chapter:currentChapter,
    scroll:window.scrollY
  };
  save();
}

window.addEventListener("scroll",()=>{
  if(currentManhwa){
    saveBookmark();
    let docHeight=document.body.scrollHeight-window.innerHeight;
    let percent=(window.scrollY/docHeight)*100;
    document.getElementById("progressBar").style.width=percent+"%";
  }
});

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light"));
}

if(localStorage.getItem("theme")==="true"){
  document.body.classList.add("light");
}

/* Folder upload */
document.getElementById("folderUpload").addEventListener("change", async function(e){
  const files=Array.from(e.target.files);
  if(files.length===0) return;

  const loadingBar=document.getElementById("loadingBar");
  const loadingFill=document.getElementById("loadingFill");
  const loadingText=document.getElementById("loadingText");
  loadingBar.style.display="block";
  loadingFill.style.width="0%";

  const firstFolder=files[0].webkitRelativePath.split("/")[0];
  const name=firstFolder;
  library[name]={chapters:[],cover:null};
  save();
  renderLibrary();

  // Group files by chapter folder
  const chaptersMap={};
  files.forEach(file=>{
    const parts=file.webkitRelativePath.split("/");
    if(parts.length>1){
      const chap=parts[1];
      if(!chaptersMap[chap]) chaptersMap[chap]=[];
      chaptersMap[chap].push(file);
    }
  });

  const sortedChapters=Object.keys(chaptersMap).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

  let totalImages=files.length;
  let processed=0;

  for(const chapName of sortedChapters){
    const imgs=[];
    const sortedFiles=chaptersMap[chapName].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    for(const f of sortedFiles){
      const url=URL.createObjectURL(f);
      imgs.push(url);
      processed++;
      const percent=Math.round((processed/totalImages)*100);
      loadingFill.style.width=percent+"%";
      loadingText.innerText=`Loading ${chapName}… ${percent}%`;
      await new Promise(r=>setTimeout(r,1));
    }
    library[name].chapters.push(imgs);
    if(!library[name].cover) library[name].cover=imgs[0];
    save();
    renderLibrary();
  }

  loadingBar.style.display="none";
});

/* Swipe & Pull-to-refresh */
let startX=0, startY=0;
document.addEventListener("touchstart",e=>{
  startX=e.changedTouches[0].screenX;
  startY=e.changedTouches[0].screenY;
});
document.addEventListener("touchend",e=>{
  let diffX=e.changedTouches[0].screenX-startX;
  let diffY=e.changedTouches[0].screenY-startY;
  if(Math.abs(diffX)>120){
    if(diffX<0) nextChapter();
    else prevChapter();
  } else if(window.scrollY===0 && diffY>120){
    goLibrary();
  }
});
</script>
</body>
</html>
